name: Deploy Tasks App to Lightsail

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Ensure Instance and Networking
        id: setup_aws
        run: |
          # 1. Crear instancia si no existe
          aws lightsail create-instances \
            --instance-names ${{ secrets.LIGHTSAIL_INSTANCE_NAME }} \
            --availability-zone us-east-1a \
            --blueprint-id ubuntu_22_04 \
            --bundle-id micro_3_0 \
            --key-pair-name id_rsa || echo "Instancia ya existente"

          # 2. Esperar a que esté Running
          echo "Esperando a que la instancia esté en estado 'running'..."
          while true; do
            STATUS=$(aws lightsail get-instance --instance-name ${{ secrets.LIGHTSAIL_INSTANCE_NAME }} --query 'instance.state.name' --output text)
            if [ "$STATUS" == "running" ]; then break; fi
            echo "Estado actual: $STATUS... esperando 5s"
            sleep 5
          done
          
          # 3. Asegurar puertos (Incluyendo el 22 por si las dudas)
          echo "Configurando Firewall..."
          for port in 22 80 8000; do
            aws lightsail open-instance-public-ports \
              --instance-name ${{ secrets.LIGHTSAIL_INSTANCE_NAME }} \
              --port-info fromPort=$port,toPort=$port,protocol=tcp || true
          done

          # 4. Obtener IP y esperar a que el OS cargue el servicio SSH
          PUBLIC_IP=$(aws lightsail get-instance --instance-name ${{ secrets.LIGHTSAIL_INSTANCE_NAME }} --query 'instance.publicIpAddress' --output text)
          echo "INSTANCE_IP=$PUBLIC_IP" >> $GITHUB_ENV
          echo "IP detectada: $PUBLIC_IP. Esperando 30s para estabilidad de SSH..."
          sleep 30

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.INSTANCE_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          connect_timeout: 30s # Darle más tiempo para conectar
          script: |
            if [ ! -d "app" ]; then
              git clone https://github.com/${{ github.repository }}.git app
            fi
            cd app
            git pull origin main
            
            # Ejecutar setup
            bash setup.sh

            # Backend
            cd aws-cloud-backend
            python3 -m venv venv
            source venv/bin/activate
            echo "DATABASE_URL=postgresql://myuser:mypassword@localhost:5432/tasks_db" > .env
            pip install -r requirements.txt
            
            pm2 delete fastapi-app || true
            pm2 start "venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000" --name fastapi-app

            # Frontend
            cd ../aws-cloud
            # CREACIÓN DEL .ENV PARA VITE (Usando la IP de la instancia)
            echo "VITE_API_URL=http://${{ env.INSTANCE_IP }}" > .env
            cd ../aws-cloud
            npm install
            npm run build